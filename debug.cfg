; Local build-time debug toggle. Flip this and re-run scripts/build_index.py
; (or commit + push so the GitHub Action rebuilds) to include/exclude every
; folder.cfg-marked "IsDebug" folder and every mail message with IsDebug=true.
;
; This file has no effect on the live site itself — there is no toggle in the
; browser. It only changes what scripts/build_index.py decides to write into
; data/index.json / data/mail.json in the first place, so debug content never
; even reaches anyone reading the published site unless YOU flip this to true
; before building/pushing.
[DEBUG]
enabled = true
