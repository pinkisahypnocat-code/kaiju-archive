name: Build site data

# Runs scripts/build_index.py first (it regenerates data/index.json and
# data/mail.json from content/) and commits the result whenever it changes.
# GitHub Pages then serves that committed, already-built site — so anyone
# opening the live URL always sees the freshly generated output, never a
# stale one, without needing Python running on the server (Pages can't do
# that; it only serves static files).
on:
  push:
    branches: [ main ]
    paths:
      - 'content/**'
      - 'scripts/build_index.py'
      - 'debug.cfg'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build data/index.json and data/mail.json from content/
        run: python3 scripts/build_index.py

      - name: Commit updated site data if it changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update site data (index + mail)"
          file_pattern: "data/index.json data/mail.json"
