name: Rebuild content index

on:
  push:
    branches: [ main ]
    paths:
      - 'content/**'
      - 'scripts/build_index.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build data/index.json from content/
        run: python3 scripts/build_index.py

      - name: Commit updated index if it changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update content index"
          file_pattern: data/index.json
